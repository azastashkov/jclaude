name: jclaude CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - run: ./gradlew --no-daemon spotlessCheck build -x integrationTest
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: '**/build/reports/'

  integration-and-parity:
    name: integration + mock parity
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon :jclaude-cli:integrationTest :jclaude-cli:parityTest

  ollama-integration:
    name: ollama integration (live LLM)
    runs-on: [self-hosted, ollama]
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon :jclaude-cli:ollamaTest -Pollama=true

  distribution:
    name: build distributions
    runs-on: ubuntu-latest
    needs: [build, integration-and-parity]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew --no-daemon :jclaude-cli:distZip :jclaude-cli:distTar :jclaude-cli:shadowJar
      - uses: actions/upload-artifact@v4
        with:
          name: jclaude-distribution
          path: |
            jclaude-cli/build/distributions/*.zip
            jclaude-cli/build/distributions/*.tar
            jclaude-cli/build/libs/*-all.jar
